<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lote 2024 – Série JDM | Linha 1:64</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #333;
    }
    header {
      background: #111;
      color: #fff;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .intro {
      background: #fff;
      padding: 20px;
      border-radius: 4px;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #eee;
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .card-content {
      padding: 15px;
    }
    .tag {
      font-size: 12px;
      color: #fff;
      background: #444;
      padding: 3px 8px;
      display: inline-block;
      margin-bottom: 8px;
      border-radius: 3px;
    }
    footer {
      background: #111;
      color: #aaa;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <h1>Linha 1:64</h1>
</header>

<div class="container">

  <div class="intro">
    <h2>Lote 2024 – Série JDM</h2>
    <p>
      Modelos Hot Wheels lacrados no blister, organizados por lote.
      As imagens abaixo são ilustrativas e representam o padrão de embalagem.
    </p>
  </div>

  <div class="grid">

    <div class="card">
  <img src="https://static.wikia.nocookie.net/hotwheels/images/2/2d/2010_Front.jpg" alt="Hot Wheels lacrado no blister">
  <div class="card-content">
    <span class="tag">Comum</span>
    <h4>Nissan Skyline GT-R R34</h4>
    <p>Série: JDM 2024<br>Cor: Azul</p>
  </div>
</div>

<div class="card">
  <img src="https://static.wikia.nocookie.net/hotwheels/images/2/2d/2010_Front.jpg" alt="Hot Wheels clássico lacrado no blister">
  <div class="card-content">
    <span class="tag">TH</span>
    <h4>Mazda RX-7 FD</h4>
    <p>Treasure Hunt<br>Blister lacrado</p>
  </div>
</div>
